<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INFECTED.space Test</title>

<style>

body{
    margin:0;
    background:#020402;
    color:#63ff75;
    font-family:Consolas,monospace;
}

#terminal{

    height:100vh;

    overflow:auto;

    padding:20px;

    box-sizing:border-box;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.03),
        rgba(255,255,255,.03) 1px,
        transparent 1px,
        transparent 3px
    );

}

.title{

    font-size:14px;

    letter-spacing:4px;

    margin-bottom:20px;

    border-bottom:1px solid #163216;

    padding-bottom:10px;

}

.line{

    margin-bottom:24px;

    line-height:1.6;

}

.source{
    color:#7aff88;
}

.detected{
    color:#b8ffbf;
}

.time{
    opacity:.6;
}

.error{
    color:#ff5e5e;
}

.success{
    color:#63ff75;
}

</style>
</head>

<body>

<div id="terminal">

    <div class="title">
        INFECTED.space • LIVE GNEWS TEST
    </div>

</div>

<script>

/*
=========================================
YOUR GNEWS API KEY
=========================================
*/

const API_KEY =
"4206ade1a2b2b88230cc01422eccd357";

/*
=========================================
TERMINAL
=========================================
*/

const terminal =
document.getElementById('terminal');

function print(text,cls=''){

    const div =
    document.createElement('div');

    div.className =
    'line ' + cls;

    div.innerHTML =
    text;

    terminal.appendChild(div);

}

/*
=========================================
ENTITY EXTRACTION
=========================================
*/

const blacklist = [

    "The",
    "WHO",
    "World",
    "Health",
    "Virus",
    "Outbreak",
    "Hantavirus",
    "Disease",
    "Agency",
    "Breaking",
    "Covid",
    "News"

];

function extractEntities(text){

    const regex =
    /\b([A-Z][a-z]+(?:\s[A-Z][a-z]+)*)\b/g;

    const matches =
    text.match(regex) || [];

    return [...new Set(

        matches.filter(word=>{

            return (
                word.length > 2 &&
                !blacklist.includes(word)
            );

        })

    )];

}

/*
=========================================
LOAD DATA
=========================================
*/

async function loadNews(){

    try{

        print(
            '[SYSTEM] CONNECTING TO GNEWS GRID...'
        );

        const response =
        await fetch(
`https://gnews.io/api/v4/search?q=hantavirus OR outbreak OR epidemic OR virus&lang=en&max=10&apikey=${API_KEY}`
        );

        const data =
        await response.json();

        console.log(data);

        /*
        VALIDATION
        */

        if(!data.articles){

            print(
                '[ERROR] INVALID API RESPONSE',
                'error'
            );

            print(
                JSON.stringify(data),
                'error'
            );

            return;

        }

        /*
        SUCCESS
        */

        print(
            `[SYSTEM] ${data.totalArticles} SIGNALS INDEXED`,
            'success'
        );

        print(
            '[SYSTEM] AI ENTITY EXTRACTION ONLINE...',
            'success'
        );

        /*
        LOOP ARTICLES
        */

        data.articles.forEach(article=>{

            const text =
            (
                article.title +
                ' ' +
                article.description +
                ' ' +
                article.content
            );

            const entities =
            extractEntities(text);

            const time =
            new Date(
                article.publishedAt
            ).toLocaleString();

            print(`

                <span class="source">
                [${article.source.name}]
                </span>

                <br><br>

                ${article.title}

                <br><br>

                <span class="detected">
                DETECTED ENTITIES:
                <br>
                ${entities.join(' • ')}
                </span>

                <br><br>

                <span class="time">
                ${time}
                </span>

            `);

        });

        print(
            '[SYSTEM] OUTBREAK FEED SYNCHRONIZED',
            'success'
        );

    }catch(err){

        print(
            `[ERROR] ${err.message}`,
            'error'
        );

        console.error(err);

    }

}

loadNews();

</script>

</body>
</html>
